<!doctype html>
<html lang="el">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<title>Echoes · σελ. 12 · Σαββατοκύριακο · R4 spread v2</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,500;1,600&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Old+Standard+TT:ital,wght@0,400;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="./spread-v2.css">
</head>
<body>
	<main class="spread">
		<header class="folio">
			<p class="folio-left">σελ. 12</p>
			<p class="folio-center">Echoes · Νυμφών 33</p>
			<p class="folio-right">από την κουζίνα</p>
		</header>

		<section class="composition">
			<div class="title-area">
				<!-- Title typeset in Old Standard TT Italic (full Greek glyphs, polytonic-aware).
				     The Greek-native serif gives a stronger neighborhood-Athens feel than
				     Cormorant Garamond, which is Latin-only. -->
				<h2 class="spread-title">
					<span class="spread-title-line">Σαββατο&shy;κύριακο.</span>
				</h2>
				<p class="spread-subhead">
					Κουλούρι Θεσσαλονίκης με <em>πέστο</em>,<br>
					<em>prosciutto</em> και αυγά.
				</p>

				<!-- The previous pull-quote in v1 was an INVENTED quote in quotation marks.
				     v2 replaces it with a section caption — a magazine "deck" headline —
				     no quote marks, no fake attribution. Just frames the page. -->
				<div class="deck">
					<p class="deck-text">
						σήμερα στην κουζίνα. <span class="deck-time">9—15</span>
					</p>
				</div>
			</div>

			<figure class="plate">
				<img
					src="../../src/assets/photos/menu/prosciutto-egg.jpg"
					alt="Κουλούρι Θεσσαλονίκης με prosciutto, αυγά και πέστο βασιλικού σε μαύρο πιάτο"
				>
				<figcaption>
					<span class="caption-label">α'</span>
					<span class="caption-body">από την κουζίνα του Echoes, στη Νυμφών 33. Πέστο βασιλικού, prosciutto, αυγά, καπνιστή provolone. Καφές από <em>Taf</em>.</span>
				</figcaption>
			</figure>
		</section>

		<footer class="run-on">
			<p class="lead">
				Από τις πρώτες κούπες καφέ μέχρι το τελευταίο cocktail. <em>Όλη μέρα στη γωνία.</em>
			</p>
			<p class="meta">
				<a href="tel:+302109901676">210 990 1676</a> &nbsp;·&nbsp;
				<a href="#" class="nav-trigger">[ περιεχόμενα ]</a>
			</p>
		</footer>
	</main>
</body>
</html>
