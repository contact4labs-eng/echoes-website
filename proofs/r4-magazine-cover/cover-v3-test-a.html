<!doctype html>
<html lang="el">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<title>v3 trial — Variant A · wordmark dominant</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,500;1,600&family=Crimson+Pro:ital,wght@0,400;0,500;1,400;1,500&family=Old+Standard+TT:ital,wght@0,400;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="./cover-v3-test-a.css">
</head>
<body>
	<!--
	   VARIANT A — wordmark dominant.
	   Wordmark fills most of the upper viewport. Plate becomes a small
	   editorial cutout tucked into the lower-left. Cover line + hours
	   anchor the lower band on the right of the plate. Colophon at base.
	-->
	<main class="cover">
		<header class="masthead">
			<p class="masthead-text">
				<span class="m-name">Echoes</span>
				<span class="m-sep">·</span>
				<span class="m-where">Νυμφών 33 · Ηλιούπολη</span>
			</p>
		</header>

		<section class="composition">
			<h1 class="wordmark" aria-label="Echoes">
				<span class="wordmark-shadow" aria-hidden="true">Echoes</span>
				<span class="wordmark-fill" aria-hidden="true">Echoes</span>
			</h1>

			<div class="lower-row">
				<figure class="cover-plate">
					<img src="../../src/assets/photos/dessert-sorbet.jpg" alt="από την κουζίνα του Echoes">
				</figure>
				<div class="lower-text">
					<p class="cover-line">Από το πρωί, στη γωνία της Νυμφών.</p>
					<p class="hours">
						καθημερινά · έως 18:00<br>
						σαβ–κυρ · έως 23:00
					</p>
				</div>
			</div>
		</section>

		<footer class="colophon">
			<p class="address">Νυμφών 33 · Ηλιούπολη <span class="postal">163 41</span></p>
			<p class="phone"><a href="tel:+302109901676">210 990 1676</a></p>
		</footer>
	</main>
</body>
</html>
