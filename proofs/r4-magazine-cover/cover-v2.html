<!doctype html>
<html lang="el">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<title>Echoes · Νυμφών 33 · R4 cover v2</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,500;1,600&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Old+Standard+TT:ital,wght@0,400;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="./cover-v2.css">
</head>
<body>
	<main class="cover">

		<!-- MASTHEAD — no "issue 01" conceit, just the address-bar of a magazine page.
		     Echoes · Νυμφών 33 · Ηλιούπολη · καφές, brunch, cocktails (the brand-in-one-line). -->
		<header class="masthead" aria-label="Echoes — Νυμφών 33, Ηλιούπολη">
			<p class="masthead-text">
				<span class="m-name">Echoes</span>
				<span class="m-sep" aria-hidden="true">·</span>
				<span class="m-where">Νυμφών 33 · Ηλιούπολη</span>
				<span class="m-sep" aria-hidden="true">·</span>
				<span class="m-cats">καφές · brunch · cocktails</span>
			</p>
		</header>

		<section class="composition">
			<div class="brand-block">
				<h1 class="wordmark" aria-label="Echoes">
					<span class="wordmark-shadow" aria-hidden="true">Echoes</span>
					<span class="wordmark-fill" aria-hidden="true">Echoes</span>
				</h1>

				<!-- Cover line: grounded, place-rooted. The all-day arc replaces the
				     previous "ήσυχη γωνία" poetic line — same warmth, more local. -->
				<p class="cover-line">
					Από το πρωί, στη γωνία της Νυμφών.
				</p>

				<!-- A small "open today" line that anchors the brand identity without
				     overclaiming. Same hours as verified in noupou.gr, written as
				     plain neighborhood-business copy. -->
				<p class="hours">
					καθημερινά πρωί · έως 18:00<br>
					σαβ–κυρ · έως 23:00
				</p>
			</div>

			<figure class="cover-plate">
				<img
					src="../../src/assets/photos/dessert-sorbet.jpg"
					alt="Επιδόρπιο: σορμπέ φράουλας πάνω σε ψημένη μπριός με μαρέγκα"
				>
				<figcaption>από την κουζίνα — μέσα στο τεύχος.</figcaption>
			</figure>
		</section>

		<!-- COLOPHON — phone is the most readable line (call-conversion preserved).
		     Address line + phone line + services line. -->
		<footer class="colophon" aria-label="Echoes — colophon">
			<p class="address"><span class="number">Νυμφών 33</span> · Ηλιούπολη <span class="postal">163 41</span></p>
			<p class="phone"><a href="tel:+302109901676">210 990 1676</a></p>
			<p class="services">
				<a href="#" class="nav-trigger">[ περιεχόμενα ]</a>
				<span class="sep" aria-hidden="true">·</span>
				<a href="https://instagram.com/echoes_bistrot" target="_blank" rel="noopener noreferrer">instagram</a>
			</p>
		</footer>

		<p class="continue" aria-hidden="true">↓ μέσα</p>
	</main>
</body>
</html>
