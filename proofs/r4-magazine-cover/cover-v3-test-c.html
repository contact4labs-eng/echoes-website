<!doctype html>
<html lang="el">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<title>v3 trial — Variant C · type-first inset</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,500;1,600&family=Crimson+Pro:ital,wght@0,400;0,500;1,400;1,500&family=Old+Standard+TT:ital,wght@0,400;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="./cover-v3-test-c.css">
</head>
<body>
	<!--
	   VARIANT C — type-first inset.
	   All typography lives at the top. The plate is a small inset frame
	   tucked into the bottom-right of the type area, like a postcard
	   pinned to a page. Less image weight, more editorial restraint.
	-->
	<main class="cover">
		<header class="masthead">
			<p class="masthead-text">
				<span class="m-name">Echoes</span>
				<span class="m-sep">·</span>
				<span class="m-where">Νυμφών 33 · Ηλιούπολη</span>
			</p>
		</header>

		<section class="composition">
			<h1 class="wordmark" aria-label="Echoes">
				<span class="wordmark-shadow" aria-hidden="true">Echoes</span>
				<span class="wordmark-fill" aria-hidden="true">Echoes</span>
			</h1>

			<p class="cover-line">Από το πρωί, στη γωνία της Νυμφών.</p>
			<p class="hours">
				καθημερινά · έως 18:00<br>
				σαβ–κυρ · έως 23:00
			</p>

			<figure class="cover-plate" aria-hidden="true">
				<img src="../../src/assets/photos/dessert-sorbet.jpg" alt="">
				<figcaption>από την κουζίνα.</figcaption>
			</figure>
		</section>

		<footer class="colophon">
			<p class="address">Νυμφών 33 · Ηλιούπολη <span class="postal">163 41</span></p>
			<p class="phone"><a href="tel:+302109901676">210 990 1676</a></p>
		</footer>
	</main>
</body>
</html>
